<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="WithMe">
<meta name="theme-color" content="#F1CC74">
<title>WithMe</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBF7E9;--sf:#FFF;--s2:#F4E4B2;--s3:#FCEDC8;
  --bd:rgba(159,143,130,.16);--bd2:rgba(159,143,130,.28);
  --tx:#3d3028;--mu:#9F8F82;--hi:#C8BAB0;
  --ac:#F1CC74;--ac2:#d4a010;
  --sc:#d4880a;--sb:rgba(212,136,10,.11);
  --tc:rgba(122,110,101,.11);--rd:#e57373;--gn:#81c784;
  --lv:#b39ddb;--sk:#81d4fa;--og:#ffb74d;
  --r:14px;--r2:22px;
  --sh:0 2px 12px rgba(180,140,60,.10);
  --sh2:0 4px 20px rgba(180,140,60,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;
  background-image:radial-gradient(circle at 15% 10%,rgba(241,204,116,.12) 0%,transparent 50%),
  radial-gradient(circle at 85% 85%,rgba(212,136,10,.07) 0%,transparent 50%)}
.app{max-width:500px;margin:0 auto;min-height:100vh}

/* HEADER */
.hd{padding:18px 18px 0;position:sticky;top:0;z-index:50;
background:rgba(251,247,233,.93);backdrop-filter:blur(14px)}
.hd-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.logo-img{font-size:24px;animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.logo-txt{font-size:17px;font-weight:800;color:var(–tx)}
.logo-txt em{font-style:normal;color:var(–ac2)}
.hd-right{display:flex;gap:8px;align-items:center}
.hd-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(–bd);background:var(–sf);
display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;
box-shadow:var(–sh);transition:all .15s}
.hd-btn:hover{transform:scale(1.08);background:var(–s2)}
.date-chip{font-size:11px;color:var(–mu);background:var(–sf);padding:5px 12px;
border-radius:999px;border:1px solid var(–bd);font-weight:700;box-shadow:var(–sh)}

/* NAV */
.nav{display:flex;gap:2px;padding:4px;background:var(–sf);border-radius:var(–r2);
margin-bottom:13px;box-shadow:var(–sh);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;min-width:48px;padding:7px 4px 6px;border:none;background:transparent;
color:var(–hi);font-size:10px;font-weight:700;cursor:pointer;border-radius:18px;
transition:all .22s;font-family:‘Nunito’,sans-serif;display:flex;flex-direction:column;
align-items:center;gap:2px}
.nb .ni{font-size:17px;line-height:1}
.nb.active{background:var(–ac);color:var(–tx);box-shadow:0 3px 10px rgba(241,204,116,.5)}

/* QUICK BAR */
.qbar{display:flex;gap:8px;margin-bottom:10px}
.qi{flex:1;background:var(–sf);border:1.5px solid var(–bd);border-radius:var(–r);
padding:0 14px;height:44px;color:var(–tx);font-size:14px;font-family:‘Nunito’,sans-serif;
font-weight:600;outline:none;transition:border-color .2s;box-shadow:var(–sh)}
.qi:focus{border-color:var(–ac2)}
.qi::placeholder{color:var(–hi);font-weight:500}
.ib{width:44px;height:44px;border-radius:var(–r);border:1.5px solid var(–bd);
background:var(–sf);color:var(–mu);cursor:pointer;display:flex;align-items:center;
justify-content:center;font-size:20px;transition:all .2s;flex-shrink:0;box-shadow:var(–sh)}
.ib:hover{transform:scale(1.06);border-color:var(–bd2)}
.ib.gold{background:var(–ac);border-color:var(–ac);color:var(–tx);
box-shadow:0 4px 14px rgba(241,204,116,.5)}
.ib.gold:hover{transform:scale(1.08)}

/* PREVIEW */
#prev{margin:0 0 10px;padding:11px 14px;background:var(–s2);border-radius:var(–r);
font-size:13px;display:none;flex-wrap:wrap;gap:10px;align-items:center;
border:1.5px dashed var(–bd2)}
#prev.on{display:flex}
.pl{color:var(–mu);font-size:11px;font-weight:700}
.rbadge{font-size:10px;color:#7a5e00;background:rgba(241,204,116,.25);
border:1px solid rgba(241,204,116,.5);padding:2px 9px;border-radius:999px;font-weight:800}

/* SECTION */
.sec{padding:0 18px 110px}
.shd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;margin-top:4px}
.stl{font-size:11px;font-weight:800;color:var(–hi);letter-spacing:.1em;text-transform:uppercase;
display:flex;align-items:center;gap:5px}
.sa{font-size:12px;color:var(–ac2);cursor:pointer;background:none;border:none;
font-family:‘Nunito’,sans-serif;font-weight:700}

/* ALERT */
.alc{background:linear-gradient(135deg,rgba(241,204,116,.12),rgba(212,136,10,.07));
border:1.5px solid rgba(241,204,116,.35);border-radius:var(–r);padding:12px 14px;
margin-bottom:8px;display:flex;gap:11px;align-items:flex-start;
animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.ai{font-size:20px;flex-shrink:0;margin-top:1px}
.at{font-size:13px;font-weight:700;margin-bottom:2px}
.as{font-size:11px;color:var(–mu);font-weight:600}

/* CAL */
.calw{background:var(–sf);border-radius:var(–r2);padding:16px;margin-bottom:14px;
box-shadow:var(–sh2);border:1px solid var(–bd)}
.calnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.calnb{background:var(–s2);border:1px solid var(–bd);color:var(–mu);font-size:16px;
cursor:pointer;padding:5px 13px;border-radius:999px;transition:all .15s;
font-family:‘Nunito’,sans-serif;font-weight:800}
.calnb:hover{background:var(–s3);color:var(–ac2)}
.calm{font-size:15px;font-weight:800;display:flex;align-items:center;gap:6px}
.caldow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px}
.caldowc{text-align:center;font-size:10px;color:var(–hi);font-weight:800;padding:2px 0}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cald{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;gap:2px;transition:all .15s}
.cald:hover{background:var(–s2);transform:scale(1.08)}
.cald.today{background:var(–ac);color:var(–tx);box-shadow:0 3px 10px rgba(241,204,116,.4)}
.cald .dr{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;max-width:28px}
.cald .dot{width:4px;height:4px;border-radius:50%}

/* WEEK */
.wknav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.wkl{font-size:14px;font-weight:800}
.wkgrid{display:flex;flex-direction:column;gap:8px}
.wkrow{display:flex;gap:10px;align-items:flex-start}
.wkdl{width:36px;flex-shrink:0;text-align:center}
.wkdn{font-size:9px;color:var(–hi);font-weight:800;text-transform:uppercase}
.wkdd{font-size:18px;font-weight:800;line-height:1.1}
.wkdd.today{color:var(–ac2)}
.wkevs{flex:1;display:flex;flex-direction:column;gap:3px;min-height:32px;
border-left:2px solid var(–bd);padding-left:10px}
.wkev{padding:7px 11px;border-radius:10px;font-size:12px;font-weight:700;
border-left:3px solid transparent;display:flex;justify-content:space-between;
align-items:center;cursor:pointer;transition:all .15s}
.wkev:hover{transform:translateX(2px)}
.wkemp{font-size:11px;color:var(–hi);padding:6px 10px;font-weight:600}

/* EVENT CARD */
.evl{display:flex;flex-direction:column;gap:8px}
.evc{background:var(–sf);border-radius:var(–r);padding:13px 15px;
border-left:4px solid var(–hi);cursor:pointer;transition:all .2s;
box-shadow:var(–sh);border:1px solid var(–bd);border-left-width:4px}
.evc:hover{box-shadow:var(–sh2);transform:translateY(-1px)}
.evc.done{opacity:.4;filter:grayscale(.3)}
.evh{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.evci{font-size:18px;flex-shrink:0}
.evt{font-size:14px;font-weight:700;flex:1}
.evd{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–mu)}
.tag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px}
.evn{font-size:12px;color:var(–mu);margin-top:5px;line-height:1.6;font-weight:600;
padding:7px 10px;background:var(–s2);border-radius:8px;white-space:pre-wrap}
.remrow{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.remc{font-size:10px;padding:3px 9px;border-radius:999px;background:var(–s2);
color:var(–mu);border:1px solid var(–bd);font-weight:700}
.evacts{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(–bd)}
.eab{padding:5px 12px;border-radius:999px;border:1.5px solid var(–bd);background:transparent;
color:var(–mu);font-size:11px;font-weight:700;cursor:pointer;font-family:‘Nunito’,sans-serif;
transition:all .15s;display:flex;align-items:center;gap:4px}
.eab:hover{border-color:var(–bd2);color:var(–tx);background:var(–s2)}
.eab.del:hover{color:#c0392b;border-color:var(–rd)}
.eab.ok:hover{color:#2e7d32;border-color:var(–gn)}
.msep{font-size:11px;font-weight:800;color:var(–hi);padding:14px 0 5px;
display:flex;align-items:center;gap:8px}
.msep::after{content:’’;flex:1;height:1px;background:var(–bd)}

/* LEAVE CARD */
.lvc{background:var(–sf);border-radius:var(–r);padding:13px 15px;margin-bottom:8px;
border-left:4px solid var(–rd);box-shadow:var(–sh);border:1px solid var(–bd);
border-left-width:4px}
.lvh{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.lvt{font-size:14px;font-weight:700;flex:1}
.lvacts{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(–bd)}

/* TODO CARD */
.tdc{background:var(–sf);border-radius:var(–r);padding:12px 14px;margin-bottom:7px;
display:flex;align-items:flex-start;gap:11px;box-shadow:var(–sh);border:1px solid var(–bd);
transition:all .2s}
.tdc:hover{box-shadow:var(–sh2)}
.tdck{width:22px;height:22px;border-radius:50%;border:2px solid var(–bd2);
background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;
display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px}
.tdc.done .tdck{background:var(–gn);border-color:var(–gn);color:#fff}
.tdc.done .tdt{text-decoration:line-through;opacity:.5}
.tdb{flex:1}
.tdt{font-size:14px;font-weight:700}
.tds{font-size:11px;color:var(–mu);margin-top:3px;font-weight:600}
.tdact{background:none;border:none;color:var(–hi);font-size:18px;cursor:pointer;
transition:color .15s;flex-shrink:0}
.tdact:hover{color:var(–rd)}

/* BIRTHDAY CARD */
.bdc{background:var(–sf);border-radius:var(–r);padding:12px 14px;margin-bottom:7px;
display:flex;align-items:center;gap:11px;box-shadow:var(–sh);border:1px solid var(–bd)}
.bdi{font-size:22px;flex-shrink:0}
.bdb{flex:1}
.bdn{font-size:14px;font-weight:700}
.bdd{font-size:11px;color:var(–mu);margin-top:2px;font-weight:600}
.bdact{background:none;border:none;color:var(–hi);font-size:18px;cursor:pointer;flex-shrink:0}
.bdact:hover{color:var(–rd)}

/* RULES */
.ri{font-size:13px;color:var(–mu);margin-bottom:16px;line-height:1.7;padding:12px 14px;
background:var(–sf);border-radius:var(–r);border-left:4px solid var(–ac);
font-weight:600;box-shadow:var(–sh)}
.rform{background:var(–sf);border-radius:var(–r2);padding:18px;margin-bottom:16px;
box-shadow:var(–sh2);border:1px solid var(–bd)}
.rft{font-size:14px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.rf{margin-bottom:12px}
.rf label{display:block;font-size:10px;color:var(–mu);font-weight:800;
letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase}
.rf input,.rf textarea{width:100%;background:var(–s2);border:1.5px solid var(–bd);
border-radius:var(–r);padding:10px 13px;color:var(–tx);font-size:13px;
font-family:‘Nunito’,sans-serif;font-weight:600;outline:none;transition:border-color .2s}
.rf input:focus,.rf textarea:focus{border-color:var(–ac2)}
.rf textarea{resize:none;height:58px;line-height:1.5}
.tgg{display:flex;gap:6px;flex-wrap:wrap}
.tgb{padding:6px 13px;border-radius:999px;border:1.5px solid var(–bd);background:var(–s2);
color:var(–mu);font-size:11px;font-weight:700;cursor:pointer;
font-family:‘Nunito’,sans-serif;transition:all .15s}
.tgb.on{background:var(–ac);border-color:var(–ac);color:var(–tx);
box-shadow:0 2px 8px rgba(241,204,116,.4)}
.arb{width:100%;height:42px;background:var(–ac);color:var(–tx);border:none;
border-radius:var(–r);font-size:13px;font-weight:800;cursor:pointer;
font-family:‘Nunito’,sans-serif;margin-top:4px;
box-shadow:0 4px 14px rgba(241,204,116,.35);transition:opacity .15s}
.arb:hover{opacity:.85}
.rcard{background:var(–sf);border-radius:var(–r);padding:12px 14px;margin-bottom:7px;
border-left:4px solid var(–ac);display:flex;gap:12px;align-items:flex-start;
box-shadow:var(–sh);border:1px solid var(–bd);border-left-width:4px}
.rcard.bi{border-left-color:var(–hi)}
.rbody{flex:1}
.rkw{font-size:14px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.rmeta{font-size:11px;color:var(–mu);font-weight:600;line-height:1.8}
.rnp{font-size:11px;color:var(–mu);font-style:italic;margin-top:2px;font-weight:600}
.rdel{background:none;border:none;color:var(–hi);font-size:20px;cursor:pointer;
line-height:1;padding:0;transition:color .15s;flex-shrink:0}
.rdel:hover{color:var(–rd)}
.bitag{font-size:9px;padding:2px 7px;border-radius:5px;background:var(–s2);
color:var(–hi);font-weight:700;border:1px solid var(–bd)}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;color:var(–hi)}
.ea{font-size:48px;margin-bottom:10px;animation:bob 3s ease-in-out infinite;display:block}
.em{font-size:14px;font-weight:700;color:var(–mu);margin-bottom:4px}
.es{font-size:12px;font-weight:600;color:var(–hi)}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(80,50,10,.45);z-index:100;
display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.modal{background:var(–bg);border-radius:26px 26px 0 0;padding:22px 20px 44px;
width:100%;max-width:500px;animation:sUp .24s cubic-bezier(.34,1.56,.64,1);
max-height:92vh;overflow-y:auto}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mttl{font-size:17px;font-weight:800;margin-bottom:16px;
display:flex;justify-content:space-between;align-items:center}
.mttl-icon{font-size:22px;margin-right:6px}
.mcls{background:var(–s2);border:none;color:var(–mu);font-size:18px;cursor:pointer;
width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
justify-content:center;transition:background .15s}
.mcls:hover{background:var(–s3)}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;color:var(–mu);font-weight:800;
letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;background:var(–sf);
border:1.5px solid var(–bd);border-radius:var(–r);padding:10px 13px;color:var(–tx);
font-size:14px;font-family:‘Nunito’,sans-serif;font-weight:600;outline:none;
transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(–ac2)}
.field textarea{resize:none;height:70px;line-height:1.5}
.field select option{background:var(–sf)}
.frow{display:flex;gap:10px}.frow .field{flex:1}
.cpills{display:flex;gap:6px;flex-wrap:wrap}
.cp{padding:7px 13px;border-radius:999px;border:1.5px solid var(–bd);background:var(–s2);
color:var(–mu);font-size:12px;font-weight:700;cursor:pointer;
font-family:‘Nunito’,sans-serif;transition:all .15s}
.rpills{display:flex;gap:6px;flex-wrap:wrap}
.rpb{padding:6px 13px;border-radius:999px;border:1.5px solid var(–bd);background:var(–s2);
color:var(–mu);font-size:11px;font-weight:700;cursor:pointer;
font-family:‘Nunito’,sans-serif;transition:all .15s}
.rpb.active{background:var(–ac);border-color:var(–ac);color:var(–tx);
box-shadow:0 2px 8px rgba(241,204,116,.35)}
.svb{width:100%;height:46px;background:var(–ac);color:var(–tx);border:none;
border-radius:var(–r);font-size:15px;font-weight:800;cursor:pointer;
font-family:‘Nunito’,sans-serif;transition:opacity .15s;
box-shadow:0 4px 16px rgba(241,204,116,.4);margin-top:4px;
display:flex;align-items:center;justify-content:center;gap:8px}
.svb:hover{opacity:.88}

/* FESTIVAL TOGGLE */
.fes-row{display:flex;align-items:center;justify-content:space-between;
padding:11px 0;border-bottom:1px solid var(–bd)}
.fes-row:last-child{border:none}
.fes-label{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.sw{width:44px;height:24px;border-radius:999px;border:none;cursor:pointer;
transition:background .2s;position:relative;flex-shrink:0}
.sw.on{background:var(–ac)}
.sw.off{background:var(–hi)}
.sw::after{content:’’;position:absolute;top:3px;width:18px;height:18px;
border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.sw.on::after{left:23px}
.sw.off::after{left:3px}

/* UPLOAD */
.upz{border:2px dashed var(–bd2);border-radius:var(–r);padding:26px;text-align:center;
cursor:pointer;transition:all .2s;position:relative;margin-bottom:12px;background:var(–s2)}
.upz:hover{border-color:var(–ac2);background:rgba(241,204,116,.08)}
.upz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upi{font-size:34px;margin-bottom:8px;display:block}
.uph{font-size:13px;color:var(–mu);line-height:1.7;font-weight:600}
.apir{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.apii{flex:1;background:var(–sf);border:1.5px solid var(–bd);border-radius:var(–r);
padding:9px 12px;color:var(–tx);font-size:12px;font-family:‘DM Mono’,monospace;outline:none}
.apii:focus{border-color:var(–ac2)}
.apisaved{font-size:12px;color:#2e7d32;font-weight:700;flex-shrink:0}
.spin{width:26px;height:26px;border:3px solid var(–bd2);border-top-color:var(–ac2);
border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.aiev{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(–bd)}
.aiev:last-child{border:none}
.aick{width:18px;height:18px;cursor:pointer;accent-color:var(–ac2);flex-shrink:0;margin-top:2px}
.aib{flex:1}
.ain{font-size:13px;font-weight:700}
.aim{font-size:11px;color:var(–mu);margin-top:2px;line-height:1.6;font-weight:600}
.sbanner{background:rgba(241,204,116,.15);border:1.5px solid rgba(241,204,116,.4);
border-radius:var(–r);padding:9px 13px;font-size:12px;color:#7a5e00;
margin-bottom:12px;font-weight:800;display:flex;align-items:center;gap:7px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;
background:rgba(251,247,233,.95);backdrop-filter:blur(14px);
border-top:1px solid var(–bd);padding:10px 18px 24px;display:flex;gap:10px;z-index:40}
.bnav-main{flex:1;height:50px;background:var(–ac);border:none;border-radius:var(–r2);
color:var(–tx);font-size:14px;font-weight:800;cursor:pointer;font-family:‘Nunito’,sans-serif;
box-shadow:0 6px 20px rgba(241,204,116,.45);transition:all .2s;
display:flex;align-items:center;justify-content:center;gap:7px}
.bnav-main:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(241,204,116,.55)}
.bnav-side{width:50px;height:50px;border-radius:var(–r2);border:1.5px solid var(–bd);
background:var(–sf);color:var(–mu);cursor:pointer;display:flex;align-items:center;
justify-content:center;font-size:20px;transition:all .2s;box-shadow:var(–sh);flex-shrink:0}
.bnav-side:hover{transform:scale(1.05);border-color:var(–bd2)}

/* TOAST */
.toast{position:fixed;bottom:94px;left:50%;transform:translateX(-50%);
background:var(–sf);border:1.5px solid rgba(241,204,116,.5);color:#7a5e00;
padding:10px 20px;border-radius:999px;font-size:12px;font-weight:800;z-index:300;
max-width:340px;text-align:center;box-shadow:var(–sh2);white-space:nowrap;
animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
</style>

</head>
<body>
<div class="app">

<div class="hd">

  <div class="field"><label>🔔 提醒</label><div class="rpills" id="rpills"></div></div>

    <button onclick="saveKey()" style="padding:7px 14px;border:1.5px solid var(--bd);border-radius:999px;background:var(--s2);color:var(--mu);font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap">儲存</button>

<script>
// ══════════════════════════════════════════
// DATA & HELPERS
// ══════════════════════════════════════════
const CATS={
  work:    {label:'工作',  icon:'💼',color:'#5ab4d6',bg:'rgba(90,180,214,.13)', tc:'#1a5a78',remDef:[1]},
  meeting: {label:'座談',  icon:'🤝',color:'#b39ddb',bg:'rgba(179,157,219,.13)',tc:'#4a3070',remDef:[7,1]},
  event:   {label:'活動',  icon:'🎉',color:'#81c784',bg:'rgba(129,199,132,.13)',tc:'#2a6040',remDef:[3,1]},
  deadline:{label:'截止',  icon:'⏳',color:'#e57373',bg:'rgba(229,115,115,.13)',tc:'#802020',remDef:[7,3,1]},
  other:   {label:'其他',  icon:'📌',color:'#ffb74d',bg:'rgba(255,183,77,.13)', tc:'#804010',remDef:[0]},
};
const REMS=[{l:'當天',d:0},{l:'1天前',d:1},{l:'3天前',d:3},{l:'7天前',d:7},{l:'2週前',d:14}];
const DOW=['一','二','三','四','五','六','日'];
const MI=['🎍','🌸','🌼','🌷','🌻','🌞','🌊','🍉','🍂','🎃','🍁','⛄'];
const FESTIVALS=[
  {id:'ny',name:"元旦",icon:'🎆',month:1,day:1},
  {id:'vd',name:"情人節",icon:'💝',month:2,day:14},
  {id:'wm',name:"婦女節",icon:'💐',month:3,day:8},
  {id:'ch',name:"兒童節",icon:'🧸',month:4,day:4},
  {id:'mt',name:"母親節",icon:'🌹',month:5,day:12},
  {id:'ft',name:"父親節",icon:'👔',month:8,day:8},
  {id:'mf',name:"中秋節",icon:'🥮',month:9,day:17},
  {id:'te',name:"教師節",icon:'📚',month:9,day:28},
  {id:'xm',name:"聖誕節",icon:'🎄',month:12,day:25},
];
const LOGO_ICONS=['🐰','🌸','🦋','⭐','🌟','💫','🌈','🦄','🐣','🌺','🍀','🎀','🎵','🌙','☀️','🐥'];
const BUILTIN_RULES=[
  {id:'b1',kw:'親師座談',cat:'meeting',rems:[7,1],note:'請提前通知家長（一週前），前一天再次確認。',builtin:true},
  {id:'b2',kw:'一對一',  cat:'meeting',rems:[7,1],note:'請提前通知家長（一週前），前一天再次確認。',builtin:true},
  {id:'b3',kw:'PTA',     cat:'meeting',rems:[7,1],note:'請提前通知家長（一週前），前一天再次確認。',builtin:true},
  {id:'b4',kw:'期中評量',cat:'deadline',rems:[7,3,1],note:'',builtin:true},
  {id:'b5',kw:'期末評量',cat:'deadline',rems:[7,3,1],note:'',builtin:true},
  {id:'b6',kw:'英語競賽',cat:'event',  rems:[7,3,1],note:'',builtin:true},
  {id:'b7',kw:'說明會',  cat:'meeting',rems:[7,1],  note:'',builtin:true},
  {id:'b8',kw:'截止',    cat:'deadline',rems:[7,3,1],note:'',builtin:true},
  {id:'b9',kw:'放假',    cat:'other',  rems:[0],    note:'',builtin:true},
];

function gl(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function sl(k,v){localStorage.setItem(k,JSON.stringify(v));}

// Try to migrate old data
function migrateData(){
  const oldKeys=['withme_events','wc_events','wc2_events','wc3_events'];
  for(const k of oldKeys){
    const v=gl(k,null);
    if(v&&Array.isArray(v)&&v.length){
      const cur=gl('wm_events',[]);
      if(!cur.length){sl('wm_events',v);toast('✅ 已自動搬移舊資料！');}
      break;
    }
  }
}

let events    = gl('wm_events',[]);
let leaves    = gl('wm_leaves',[]);
let todos     = gl('wm_todos',[]);
let birthdays = gl('wm_bdays',[]);
let cRules    = gl('wm_rules',[]);
let fesToggle = gl('wm_fes',{});
let logoIcon  = gl('wm_logo','🐰');

let editId=null,selRems=[],selCat='work',rfRems=[1],rfCat='work';
let curView='today';
const today=new Date();today.setHours(0,0,0,0);
let calY=today.getFullYear(),calM=today.getMonth();
let wkStart=(()=>{const d=new Date(today);d.setDate(today.getDate()-(today.getDay()||7)+1);return d;})();

function sv2(k,v){
  if(k==='events')   {events=v;sl('wm_events',v);}
  else if(k==='leaves'){leaves=v;sl('wm_leaves',v);}
  else if(k==='todos'){todos=v;sl('wm_todos',v);}
  else if(k==='bdays'){birthdays=v;sl('wm_bdays',v);}
  else if(k==='rules'){cRules=v;sl('wm_rules',v);}
}

function fmt(d){return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function fd(iso){if(!iso)return'';const[,m,d]=iso.split('-');return`${+m}/${+d}`;}
function ad(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function ito(){return fmt(today);}
function allRules(){return[...cRules,...BUILTIN_RULES];}
function matchRule(t){for(const r of allRules())if(t.includes(r.kw))return r;return null;}

// Init
document.getElementById('dchip').textContent=today.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});
document.getElementById('logo-icon').textContent=logoIcon;
migrateData();

// ══════════════════════════════════════════
// QUICK INPUT
// ══════════════════════════════════════════
document.getElementById('qtxt').addEventListener('input',function(){showPrev(this.value);});
document.getElementById('qtxt').addEventListener('keydown',e=>{if(e.key==='Enter')quickAdd();});

function parseQ(raw){
  let date=null;const yr=today.getFullYear();
  const m=raw.match(/(\d{1,2})\/(\d{1,2})/);
  if(m)date=`${yr}-${p2(m[1])}-${p2(m[2])}`;
  if(!date){
    if(/今天/.test(raw))date=ito();
    if(/明天/.test(raw))date=fmt(ad(today,1));
    const wm=raw.match(/週([一二三四五六日天])/);
    if(wm){const wmap={一:1,二:2,三:3,四:4,五:5,六:6,日:0,天:0};const t=wmap[wm[1]];let diff=t-today.getDay();if(diff<=0)diff+=7;date=fmt(ad(today,diff));}
  }
  let title=raw.replace(/\d{1,2}\/\d{1,2}/,'').replace(/今天|明天|週[一二三四五六日天]/,'').trim()||raw.trim();
  const rule=matchRule(title)||matchRule(raw);
  return{title,date,rule};
}

function showPrev(raw){
  const box=document.getElementById('prev');
  if(!raw.trim()){box.className='';box.innerHTML='';return;}
  const{title,date,rule}=parseQ(raw);
  const cat=rule?rule.cat:'work';const c=CATS[cat];
  const rems=rule?rule.rems:c.remDef;
  box.className='on';
  box.innerHTML=`
    <div style="display:flex;align-items:center;gap:6px"><span style="font-size:15px">${c.icon}</span><b style="font-size:13px">${title||'—'}</b></div>
    <div style="font-size:12px;color:var(--mu);font-weight:600">📅 ${date?fd(date):'未偵測'}</div>
    <span class="tag" style="background:${c.bg};color:${c.tc}">${c.icon} ${c.label}</span>
    <div style="font-size:11px;color:var(--mu);font-weight:600">🔔 ${rems.map(r=>r===0?'當天':r+'天前').join('、')}</div>
    ${rule?`<span class="rbadge">⚡ ${rule.kw}</span>`:''}`;
}

function quickAdd(){
  const raw=document.getElementById('qtxt').value.trim();if(!raw)return;
  const{title,date,rule}=parseQ(raw);
  const cat=rule?rule.cat:'work';
  events.unshift({id:Date.now(),title,date,time:null,cat,rems:rule?rule.rems:CATS[cat].remDef,note:rule?rule.note:'',done:false});
  sv2('events',events);render();
  document.getElementById('qtxt').value='';
  document.getElementById('prev').className='';document.getElementById('prev').innerHTML='';
  if(rule)toast(`⚡ 套用規則「${rule.kw}」`);
}

// ══════════════════════════════════════════
// VIEWS
// ══════════════════════════════════════════
function sv(v,btn){
  curView=v;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');render();
}

function render(){
  const sec=document.getElementById('msec');
  if(curView==='today')       sec.innerHTML=rToday();
  else if(curView==='week')   sec.innerHTML=rWeek();
  else if(curView==='month')  sec.innerHTML=rMonth();
  else if(curView==='all')    sec.innerHTML=rAll();
  else if(curView==='leave')  sec.innerHTML=rLeave();
  else if(curView==='todo')   sec.innerHTML=rTodo();
  else if(curView==='rules')  {sec.innerHTML=rRules();bRFCats();bRFRems();}
  document.querySelectorAll('.wkev[data-id]').forEach(el=>{
    el.addEventListener('click',()=>openAdd(+el.dataset.id));
  });
  checkNotif();
}

// TODAY
function rToday(){
  const iso=ito();
  const te=events.filter(e=>e.date===iso&&!e.done);
  const rems=events.filter(e=>{
    if(!e.date||e.done)return false;
    const diff=Math.round((new Date(e.date+'T00:00:00')-today)/864e5);
    return diff>0&&(e.rems||[]).includes(diff);
  });
  // Birthday check
  const bdToday=birthdays.filter(b=>parseInt(b.month)===today.getMonth()+1&&parseInt(b.day)===today.getDate());
  // Festival check
  const fesToday=FESTIVALS.filter(f=>f.month===today.getMonth()+1&&f.day===today.getDate()&&fesToggle[f.id]);
  let html='';
  if(bdToday.length||fesToday.length||rems.length){
    [...fesToday.map(f=>`<div class="alc"><div class="ai">${f.icon}</div><div><div class="at">今天是${f.name}！</div></div></div>`),
     ...bdToday.map(b=>`<div class="alc"><div class="ai">🎂</div><div><div class="at">🎉 ${b.name} 今天生日！</div>${b.note?`<div class="as">${b.note}</div>`:''}</div></div>`),
     ...rems.map(ev=>{const c=CATS[ev.cat]||CATS.other;const diff=Math.round((new Date(ev.date+'T00:00:00')-today)/864e5);return`<div class="alc"><div class="ai">${c.icon}</div><div><div class="at">提醒：${ev.title}</div><div class="as">📅 ${diff}天後（${fd(ev.date)}）${ev.note?' · '+ev.note.slice(0,25):''}</div></div></div>`;})
    ].forEach(h=>html+=h);
  }
  html+=`<div class="shd" style="margin-top:${rems.length||bdToday.length?14:4}px"><span class="stl">☀️ 今日事件</span></div>`;
  if(!te.length) html+=`<div class="empty"><span class="ea">🌸</span><div class="em">今天沒有事件</div><div class="es">輕鬆的一天！</div></div>`;
  else html+=rCards(te);
  const up=events.filter(e=>{if(!e.date||e.done)return false;const d=Math.round((new Date(e.date+'T00:00:00')-today)/864e5);return d>0&&d<=7;}).sort((a,b)=>a.date.localeCompare(b.date));
  if(up.length){html+=`<div class="shd" style="margin-top:18px"><span class="stl">📅 未來7天</span></div>`;html+=rCards(up);}
  return html;
}

// WEEK
function rWeek(){
  const end=ad(wkStart,6);
  let html=`<div class="wknav"><button class="calnb" onclick="wprev()">‹</button><span class="wkl">📋 ${wkStart.getMonth()+1}/${wkStart.getDate()} – ${end.getMonth()+1}/${end.getDate()}</span><button class="calnb" onclick="wnext()">›</button></div><div class="wkgrid">`;
  for(let i=0;i<7;i++){
    const d=ad(wkStart,i);const iso=fmt(d);const isT=iso===ito();
    const de=events.filter(e=>e.date===iso&&!e.done);
    html+=`<div class="wkrow"><div class="wkdl"><div class="wkdn">${DOW[i]}</div><div class="wkdd${isT?' today':''}">${d.getDate()}</div></div><div class="wkevs">`;
    if(!de.length)html+=`<span class="wkemp">—</span>`;
    else de.forEach(ev=>{const c=CATS[ev.cat]||CATS.other;html+=`<div class="wkev" style="background:${c.bg};border-left-color:${c.color}" data-id="${ev.id}"><span>${c.icon} ${ev.title}</span><span style="font-size:10px;color:var(--mu)">${ev.time||''}</span></div>`;});
    html+=`</div></div>`;
  }
  return html+'</div>';
}
function wprev(){wkStart=ad(wkStart,-7);render();}
function wnext(){wkStart=ad(wkStart,7);render();}

// MONTH
function rMonth(){
  const first=(new Date(calY,calM,1).getDay()||7)-1;
  const days=new Date(calY,calM+1,0).getDate();
  let html=`<div class="calw"><div class="calnav"><button class="calnb" onclick="cprev()">‹</button><span class="calm">${MI[calM]} ${calY}年${calM+1}月</span><button class="calnb" onclick="cnext()">›</button></div><div class="caldow">${DOW.map(d=>`<div class="caldowc">${d}</div>`).join('')}</div><div class="calgrid">`;
  html+=Array(first).fill('<div></div>').join('');
  for(let d=1;d<=days;d++){
    const iso=`${calY}-${p2(calM+1)}-${p2(d)}`;
    const evs=events.filter(e=>e.date===iso&&!e.done);
    const isT=iso===ito();
    const dots=evs.slice(0,4).map(e=>`<div class="dot" style="background:${(CATS[e.cat]||CATS.other).color}"></div>`).join('');
    html+=`<div class="cald${isT?' today':''}" onclick="openAdd(null,'${iso}')"><span>${d}</span>${dots?`<div class="dr">${dots}</div>`:''}</div>`;
  }
  html+=`</div></div>`;
  const mo=`${calY}-${p2(calM+1)}`;
  const me=events.filter(e=>e.date?.startsWith(mo)).sort((a,b)=>a.date.localeCompare(b.date));
  html+=me.length?rCards(me):`<div class="empty"><span class="ea">${MI[calM]}</span><div class="em">這個月沒有事件</div></div>`;
  return html;
}

const EP=`找出所有有日期的事件。分類：meeting=親師座談/PTA/說明會，deadline=截止/考試/評量，event=活動/比賽，work=會議，other=其他。提醒：meeting=[7,1]，deadline=[7,3,1]，event=[3,1]，work=[1]，other=[0]。今年${today.getFullYear()}年。只回傳JSON：{"events":[{"title":"","date":"YYYY-MM-DD","time":null,"category":"","note":"","rems":[]}]}`;

async function handleFile(file){
const key=localStorage.getItem(‘wm_apikey’);
if(!key){toast(‘⚠️ 請先輸入 API Key’);return;}
document.getElementById(‘up-body’).innerHTML=`<div style="text-align:center;padding:28px"><div class="spin"></div><p style="font-size:13px;color:var(--mu);font-weight:600">🤖 分析「${file.name}」中…</p></div>`;
try{
let messages;
if(file.type.startsWith(‘image/’)||file.type===‘application/pdf’){
const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(’,’)[1]);r.onerror=rej;r.readAsDataURL(file);});
messages=[{role:‘user’,content:[{type:file.type.startsWith(‘image/’)?‘image’:‘document’,source:{type:‘base64’,media_type:file.type,data:b64}},{type:‘text’,text:EP}]}];
}else{messages=[{role:‘user’,content:`${EP}\n\n${(await file.text()).slice(0,8000)}`}];}
const res=await fetch(‘https://api.anthropic.com/v1/messages’,{method:‘POST’,headers:{‘Content-Type’:‘application/json’,‘x-api-key’:key,‘anthropic-version’:‘2023-06-01’,‘anthropic-dangerous-direct-browser-access’:‘true’},body:JSON.stringify({model:‘claude-opus-4-5’,max_tokens:2000,messages})});
const data=await res.json();
if(data.error)throw new Error(data.error.message);
const parsed=JSON.parse(data.content.map(c=>c.text||’’).join(’’).replace(/`json|`/g,’’).trim());
showAIRes(parsed.events||[]);
}catch(e){
document.getElementById(‘up-body’).innerHTML=`<p style="color:var(--rd);font-size:13px;text-align:center;padding:14px;font-weight:700">❌ ${e.message}</p>`;
setTimeout(resetUpBody,2500);
}
}

function showAIRes(evs){
if(!evs.length){document.getElementById(‘up-body’).innerHTML=`<div class="empty"><span class="ea">🔍</span><div class="em">沒有找到事件</div></div>`;setTimeout(resetUpBody,2000);return;}
window._aiEvs=evs;
evs.forEach(ev=>{const rule=matchRule(ev.title);if(rule){ev.category=rule.cat;ev.rems=rule.rems;if(rule.note&&!ev.note)ev.note=rule.note;}});
let html=`<div class="sbanner">⚡ 找到 ${evs.length} 個事件！</div>`;
html+=evs.map((ev,i)=>{const c=CATS[ev.category]||CATS.other;return`<div class="aiev"><input type="checkbox" class="aick" id="ai${i}" checked/><div class="aib"><div class="ain">${c.icon} ${ev.title}</div><div class="aim">📅 ${ev.date||''}${ev.time&&ev.time!='null'?' '+ev.time:''} · <span style="color:${c.color}">${c.label}</span>${ev.rems?' · 🔔 '+ev.rems.map(r=>r===0?'當天':r+'天前').join('、'):''}</div>${ev.note?`<div class="aim" style="font-style:italic">📝 ${ev.note}</div>`:''}</div></div>`;}).join(’’);
html+=`<button class="svb" style="margin-top:14px" onclick="importAI()">✨ 匯入勾選的事件</button>`;
document.getElementById(‘up-body’).innerHTML=html;
}

function checkNotif(){

if(Notification.permission!==‘granted’)return;

if(!ev.date||ev.done)return;
const diff=Math.round((new Date(ev.date+‘T00:00:00’)-today)/864e5);
if((ev.rems||[]).includes(diff)){
const key=`wm_n_${ev.id}_${diff}`;
if(!sessionStorage.getItem(key)){
